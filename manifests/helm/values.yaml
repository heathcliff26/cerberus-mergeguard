# Default values for cerberus-mergeguard.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# Configure cerberus-mergeguard
config:
  # Optional, can be omitted
  # The log level. Can be overriden with cli arguments.
  # Default: info
  log-level: info

  # Optional, can be omitted
  # The server configuration.
  server:
    # Optional, can be omitted
    # The host to bind the server to.
    # Default: 8080
    port: 8080

    # Optional, can be omitted
    # Environment variable: CERBERUS_WEBHOOK_SECRET
    # The webhook secret shared with github. Is used to verify that the requests are coming from github.
    webhook-secret: ""

    # Optional, can be omitted
    # Set the interval in seconds in which the server should update check-runs.
    # This limits the number of api requests to github by bundling updates for multiple webhook events for the same commit.
    # When disabled, the server will update check-runs immediately after receiving a webhook event.
    # Default: 0s (disabled)
    periodic-refresh: 0

    # Optional, can be omitted
    # The SSL configuration.
    ssl:
      # Optional, can be omitted
      # Whether to enable SSL.
      # Default: false
      enabled: false

      # Optional, can be omitted
      # The path to the SSL certificate file.
      cert: ""

      # Optional, can be omitted
      # The path to the SSL private key file.
      key: ""

  # Required
  # The github app configuration.
  github:
    # Required
    # The app client ID. Is displayed when you go to your app under https://github.com/settings/apps/
    client-id: ""

    # Required
    # The private keyfile for the app.
    private-key: ""

    # Optional, can be omitted
    # The API URL for github.
    # Default: https://api.github.com
    api: "https://api.github.com"


# This is for setting the number of replicas.
replicaCount: 2

# Container image configuration
image:
  repository: ghcr.io/heathcliff26/cerberus-mergeguard
  tag: ""
  pullPolicy: IfNotPresent

# This is for the secrets for pulling an image from a private repository more information can be found here: https://kubernetes.io/docs/tasks/configure-pod-container/pull-image-private-registry/
imagePullSecrets: []
# This is to override the chart name.
nameOverride: ""
fullnameOverride: ""

# Define the environment of the container from secrets.
# Should be used to inject the webhook secret
envFrom: []
  # - secretRef:
  #   name: cerberus-mergeguard-webhook

# This is for setting Kubernetes Annotations to a Pod.
# For more information checkout: https://kubernetes.io/docs/concepts/overview/working-with-objects/annotations/
podAnnotations: {}
# This is for setting Kubernetes Labels to a Pod.
# For more information checkout: https://kubernetes.io/docs/concepts/overview/working-with-objects/labels/
podLabels: {}

# This is for setting the pod security context.
podSecurityContext:
  runAsUser: 65534
  runAsGroup: 65534
  runAsNonRoot: true

# This is for setting the container security context.
securityContext:
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

# This is for setting up a service.
service:
  # This sets the service type.
  type: ClusterIP
  ipFamilyPolicy: PreferDualStack
  ipFamilies:
    - IPv4
    - IPv6
  # Port to expose the service on.
  port: 8080

# This block is for setting up the ingress for more information can be found here: https://kubernetes.io/docs/concepts/services-networking/ingress/
ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: cerberus-mergeguard.example.org
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
    # - secretName: cerberus-mergeguard-tls
    #   hosts:
    #     - cerberus-mergeguard.example.org

# -- Expose the service via gateway-api HTTPRoute
# Requires Gateway API resources and suitable controller installed within the cluster
# (see: https://gateway-api.sigs.k8s.io/guides/)
httpRoute:
  # HTTPRoute enabled.
  enabled: false
  # HTTPRoute annotations.
  annotations: {}
  # Which Gateways/ListenerSet this Route is attached to.
  parentRefs: []
  # Hostnames matching HTTP header.
  hostnames: []
  # List of rules and filters applied.
  rules: []
  # - matches:
  #   - path:
  #       type: PathPrefix
  #       value: /echo
  #     headers:
  #     - name: version
  #       value: v2
  #   filters:
  #   - type: RequestHeaderModifier
  #     requestHeaderModifier:
  #       set:
  #       - name: My-Overwrite-Header
  #         value: this-is-the-only-value
  #       remove:
  #       - User-Agent

# -- Optionally create a listener set for self-service ssl certificates
# Requires Gateway API resources v1.5+ and suitable controller installed within the cluster
# (see: https://gateway-api.sigs.k8s.io/guides/)
listenerSet:
  # ListenerSet enabled.
  enabled: false
  # ListenerSet annotations.
  annotations: {}
  # Which Gateway this ListenerSet is attached to.
  parentRef:
    name: ""
    namespace: ""
  # List of listeners
  listeners: []
    # - name: cerberus-mergeguard
    #   hostname: cerberus-mergeguard.example.org
    #   port: 80
    #   protocol: HTTP

resources:
  requests:
    cpu: "50m"
    memory: "8Mi"
  # limits:
  #   cpu: 100m
  #   memory: 128Mi

# This is to setup the liveness and readiness probes more information can be found here: https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-startup-probes/
livenessProbe:
  enabled: true
  initialDelaySeconds: 1
  periodSeconds: 5
  failureThreshold: 3
  timeoutSeconds: 1
readinessProbe:
  enabled: true
  initialDelaySeconds: 1
  periodSeconds: 5
  timeoutSeconds: 1

# Additional volumes on the output Deployment definition.
volumes: []
  # - name: foo
  #   secret:
  #     secretName: mysecret
  #     optional: false

# Additional volumeMounts on the output Deployment definition.
volumeMounts: []
  # - name: foo
  #   mountPath: "/etc/foo"
  #   readOnly: true

nodeSelector: {}

tolerations: []

affinity: {}
